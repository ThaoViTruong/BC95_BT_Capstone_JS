<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"
      integrity="sha512-h9644v03pHqrIHThkvXhB2PJ8zf5E9IyVnrSfZg8Yj8k4RsO4zldcQc4Bi9iVLUCCsqNY0b4WXVV4UB+wbWENA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <title>Admin - Cyber Store</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-gradient-to-br from-slate-100 to-teal-50 min-h-screen">
    <header
      class="sticky top-0 z-50 bg-white/80 backdrop-blur border-b border-slate-200"
    >
      <div
        class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between"
      >
        <span class="text-2xl font-bold uppercase tracking-tight text-teal-700"
          ><i class="fa-brands fa-android"></i> CyberPhone-Admin</span
        >
        <a
          href="../../index.html"
          class="text-base font-medium text-teal-700 hover:underline"
          >Back to HomePage</a
        >
      </div>
    </header>

    <main
      class="max-w-6xl mx-auto px-4 py-16 grid grid-cols-1 lg:grid-cols-3 gap-6"
    >
      <section
        class="lg:col-span-1 bg-white rounded-2xl shadow-md border border-slate-200 p-6"
      >
        <h2 class="text-lg font-semibold text-slate-800 mb-4">Form sản phẩm</h2>
        <form id="productForm" class="space-y-3">
          <input
            id="name"
            type="text"
            placeholder="Tên sản phẩm"
            class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400 transition"
          />
          <input
            id="price"
            type="number"
            min="0"
            placeholder="Giá"
            class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400"
          />
          <input
            id="img"
            type="text"
            placeholder="Link ảnh"
            class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400"
          />
          <input
            id="screen"
            type="text"
            placeholder="Màn hình"
            class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400"
          />
          <input
            id="backCamera"
            type="text"
            placeholder="Camera sau"
            class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400"
          />
          <input
            id="frontCamera"
            type="text"
            placeholder="Camera trước"
            class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400"
          />
          <input
            id="desc"
            type="text"
            placeholder="Mô tả"
            class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400"
          />
          <select
            id="type"
            class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400"
          >
            <option value="">Chọn loại</option>
            <option value="iphone">iPhone</option>
            <option value="Samsung">Samsung</option>
          </select>
          <div class="flex gap-2 pt-2">
            <button
              type="submit"
              id="btnSave"
              class="flex-1 bg-teal-600 text-white rounded-lg py-2 hover:bg-teal-700"
            >
              Tạo mới
            </button>
            <button
              type="button"
              id="btnUpdate"
              class="flex-1 bg-amber-500 text-white rounded-lg py-2 hover:bg-amber-600 hidden"
            >
              Cập nhật
            </button>
            <button
              type="button"
              id="btnReset"
              class="px-4 bg-slate-200 rounded-lg py-2 hover:bg-slate-300"
            >
              Reset
            </button>
          </div>
        </form>
        <p id="message" class="mt-3 text-sm"></p>
      </section>

      <section
        class="lg:col-span-2 bg-white rounded-2xl shadow-md border border-slate-200 p-6"
      >
        <div class="flex flex-col sm:flex-row gap-3 justify-between mb-4">
          <h2 class="text-lg font-semibold text-slate-800">
            Danh sách sản phẩm
          </h2>

          <div class="flex gap-2 items-center">
            <input
              id="keyword"
              type="search"
              placeholder="Tìm theo tên..."
              class="border rounded-lg px-3 py-2 w-56 outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400"
            />

            <button
              id="btnSearch"
              class="bg-teal-600 text-white px-4 py-2 rounded-lg hover:bg-teal-700"
            >
              Tìm
            </button>

            <select
              id="sortSelect"
              class="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-400 focus:border-teal-400"
            >
              <option value="">Sắp xếp</option>
              <option value="asc">Giá tăng dần</option>
              <option value="desc">Giá giảm dần</option>
            </select>
          </div>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50">
              <tr class="border-b text-slate-600">
                <th class="text-left py-2">ID</th>
                <th class="text-left py-2">Tên</th>
                <th class="text-left py-2">Giá</th>
                <th class="text-left py-2">Loại</th>
                <th class="text-left py-2">Hành động</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <footer class="border-t border-slate-200 bg-slate-50 py-10">
      <div
        class="mx-auto flex max-w-7xl flex-col items-center justify-between gap-6 px-6 text-center md:flex-row md:text-left"
      >
        <div>
          <a class="text-lg font-bold text-teal-700" href="../../index.html"
            >Cyber phone</a
          >
          <p class="mt-2 text-xs uppercase tracking-widest text-slate-500">
            © 2026 Cyber phone. All rights reserved.
          </p>
        </div>
        <div
          class="flex flex-wrap justify-center gap-6 text-xs uppercase tracking-widest text-slate-500"
        >
          <a
            class="transition-colors hover:text-teal-600 hover:underline"
            href="#"
            >Privacy policy</a
          >
          <a
            class="transition-colors hover:text-teal-600 hover:underline"
            href="#"
            >Terms of service</a
          >
          <a
            class="transition-colors hover:text-teal-600 hover:underline"
            href="#"
            >Support</a
          >
        </div>
      </div>
    </footer>

    <script type="module" src="../js/admin.js"></script>
  </body>
</html>
